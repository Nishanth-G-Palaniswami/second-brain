name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: guardrails
        run: python tests/test_guardrails.py
      - name: gmail draft parser
        run: python tests/test_gmail_parse_draft.py
